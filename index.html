<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/shield.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Avenue+Mono&display=swap"
      rel="stylesheet"
    />
    <meta name="description" content="SBM ThreatForge" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>SBM ThreatForge</title>
    <script>
      // Prevent flash of wrong background color on page load
      (function () {
        var stored = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var isDark = stored === "dark" || (!stored && prefersDark);
        if (isDark) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      /* Initial background colors to prevent flash */
      html {
        background-color: #fafaf9;
      }
      html.dark {
        background-color: #101012;
      }
      body {
        background-color: inherit;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/bootstrap.jsx"></script>
  </body>
</html>
